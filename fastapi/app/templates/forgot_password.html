{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<section class="auth-container">
    <div class="auth-card">
        <h1>Reset Password</h1>
        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        {% if message %}
            <div class="alert alert-success">{{ message }}</div>
        {% endif %}
        <form method="post" action="/forgot-password" class="form">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required placeholder="you@example.com">

            <label for="new_password">New Password</label>
            <input id="new_password" name="new_password" type="password" required minlength="6" placeholder="New password">

            <button type="submit" class="btn-primary full-width">Update Password</button>
        </form>

        <div class="auth-links">
            <a href="/login">Back to login</a>
        </div>
    </div>
</section>
{% endblock %}
